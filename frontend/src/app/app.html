<div class="min-h-screen bg-gray-100 flex flex-col items-center py-10">
  <h1 class="text-4xl font-bold text-blue-700 mb-8">Welcome to {{title}}!</h1>
  <div class="flex gap-2 mb-6 w-full max-w-md">
    <input type="text" [(ngModel)]="newTodo" placeholder="Add a new todo" (keyup.enter)="addTodo()"
      class="flex-1 px-4 py-2 border border-gray-300 rounded shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-400" />
    <button (click)="addTodo()"
      class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700 transition">Add</button>
  </div>
  <ul class="w-full max-w-md bg-white rounded shadow divide-y divide-gray-200">
    <li *ngFor="let todo of todos" class="flex items-center justify-between px-4 py-3">
      <span class="text-gray-800">{{todo.task}}</span>
      <button (click)="deleteTodo(todo.id)"
        class="ml-4 px-3 py-1 bg-red-500 text-white rounded hover:bg-red-600 transition">Delete</button>
    </li>
  </ul>
  <router-outlet></router-outlet>
</div>
